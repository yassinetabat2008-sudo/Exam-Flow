<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Acceptance Test Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0d1f3c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            max-width: 700px;
            width: 100%;
            padding: 60px 40px;
            backdrop-filter: blur(20px);
        }
        h1 {
            color: #fff;
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 700;
            text-align: center;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input[type="text"],
        input[type="number"],
        input[type="tel"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="tel"]:focus {
            outline: none;
            border-color: rgba(139, 213, 255, 0.4);
            background: rgba(139, 213, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(139, 213, 255, 0.1);
        }
        input[type="text"]::placeholder,
        input[type="number"]::placeholder,
        input[type="tel"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .checkbox-group {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: rgba(139, 213, 255, 0.6);
        }
        .checkbox-item label {
            margin-bottom: 0;
            cursor: pointer;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            justify-content: center;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .btn-submit {
            background: rgba(139, 213, 255, 0.18);
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(139, 213, 255, 0.3);
        }
        .btn-submit:hover {
            background: rgba(139, 213, 255, 0.28);
            border-color: rgba(139, 213, 255, 0.4);
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-decoration: none;
            display: inline-block;
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
        }
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .checkbox-group {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👨‍🎓 Student Registration</h1>
        <p class="subtitle">Fill in your information to proceed with the admission test</p>
        
        <form id="regForm" onsubmit="registerStudent(event)">
            <div class="form-group">
                <label for="name">Name *</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="age">Age *</label>
                    <input type="number" id="age" placeholder="Enter your age" min="10" max="100" required>
                </div>
                <div class="form-group">
                    <label for="phone">Numéro de père ou mère *</label>
                    <input type="tel" id="phone" placeholder="+212 XXX XXX XXX" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="gender">Gender *</label>
                    <select id="gender" style="width: 100%; padding: 12px 14px; border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; background: rgba(255, 255, 255, 0.06); color: rgba(255, 255, 255, 0.9); font-size: 0.95rem;" required>
                        <option value="" style="background: #0f172a; color: #fff;">Select Gender</option>
                        <option value="Male" style="background: #0f172a; color: #fff;">Male</option>
                        <option value="Female" style="background: #0f172a; color: #fff;">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="province">Province *</label>
                    <input type="text" id="province" placeholder="Enter province of school" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="school">School *</label>
                <input type="text" id="school" placeholder="Enter your school name" required>
            </div>
            
            <div class="form-group">
                <label>School Type *</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="privee" name="school_type" value="Privée" onclick="handleCheckbox(this)">
                        <label for="privee">Privée</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="public" name="school_type" value="Public" onclick="handleCheckbox(this)">
                        <label for="public">Public</label>
                    </div>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="regional">Note du régional du 4ème *</label>
                    <input type="number" id="regional" placeholder="Ex: 15.5" step="0.01" min="0" max="20" required>
                </div>
                <div class="form-group">
                    <label for="total">Note du 4ème totale *</label>
                    <input type="number" id="total" placeholder="Ex: 14.2" step="0.01" min="0" max="20" required>
                </div>
            </div>
            
            <div class="buttons">
                <button type="submit" class="btn btn-submit">Submit Registration</button>
                <a href="index.html" class="btn btn-back">← Back to Role Selection</a>
            </div>

            <!-- ID Login / Status Check -->
            <div style="margin-top: 35px; border-top: 1px dashed rgba(255,255,255,0.15); padding-top: 25px; text-align: center;">
                <label for="check_id" style="color: rgba(255,255,255,0.85); font-weight: 500; font-size: 0.95rem; margin-bottom: 10px; display: block;">Already Registered?</label>
                <div style="display: flex; gap: 10px; align-items: center; max-width: 500px; margin: 0 auto;">
                    <input type="text" id="check_id" placeholder="Enter your Student ID (e.g., std_mock)" style="padding: 10px 12px; font-size: 0.9rem;">
                    <button type="button" onclick="checkStudentStatus()" class="btn btn-submit" style="padding: 10px 20px; white-space: nowrap;">Check Status</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        function handleCheckbox(checkbox) {
            const checkboxes = document.getElementsByName('school_type');
            checkboxes.forEach((item) => {
                if (item !== checkbox) item.checked = false;
            });
        }

        function registerStudent(event) {
            event.preventDefault();
            
            const checkboxes = document.getElementsByName('school_type');
            let schoolType = "";
            checkboxes.forEach((item) => {
                if (item.checked) schoolType = item.value;
            });

            if (!schoolType) {
                alert("Please select a school type.");
                return;
            }

            const studentId = "std_" + Math.random().toString(16).substring(2, 10);
            const studentData = {
                student_id: studentId,
                name: document.getElementById('name').value,
                age: document.getElementById('age').value,
                phone: document.getElementById('phone').value,
                gender: document.getElementById('gender').value,
                province: document.getElementById('province').value,
                school: document.getElementById('school').value,
                school_type: schoolType,
                regional: document.getElementById('regional').value,
                total: document.getElementById('total').value,
                status: "pending",
                registered_at: new Date().toISOString()
            };

            // Save student data to list
            let students = JSON.parse(localStorage.getItem('students') || '[]');
            students.push(studentData);
            localStorage.setItem('students', JSON.stringify(students));
            
            // Set current student session
            localStorage.setItem('current_student_id', studentId);
            localStorage.setItem('exam_status_' + studentId, 'waiting');

            // Redirect to waiting room
            window.location.href = "waiting_room.html?student_id=" + studentId;
        }

        function checkStudentStatus() {
            const id = document.getElementById('check_id').value.trim();
            if (!id) {
                alert("Please enter your Student ID.");
                return;
            }
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            const studentExists = students.some(s => s.student_id === id);
            if (studentExists) {
                localStorage.setItem('current_student_id', id);
                const status = localStorage.getItem('exam_status_' + id) || 'waiting';
                if (status === 'waiting' || status === 'started') {
                    window.location.href = "waiting_room.html?student_id=" + id;
                } else {
                    window.location.href = "student_dashboard.html?student_id=" + id;
                }
            } else {
                alert("Student ID not found. (Hint: Use 'std_mock' for testing)");
            }
        }
    </script>
</body>
</html>
