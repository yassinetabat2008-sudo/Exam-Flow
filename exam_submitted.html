<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Submitted - Acceptance Test Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0d1f3c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 50px 40px;
            text-align: center;
            backdrop-filter: blur(20px);
        }
        .status-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #4ade80;
        }
        h1 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .status-text {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            font-size: 1rem;
            line-height: 1.6;
        }
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
        }
        .btn-primary {
            background: rgba(139, 213, 255, 0.18);
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(139, 213, 255, 0.3);
        }
        .btn-primary:hover {
            background: rgba(139, 213, 255, 0.28);
            border-color: rgba(139, 213, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-icon">✓</div>
        <h1>Exam Submitted!</h1>
        <p class="status-text">
            Your exam answers have been successfully uploaded. The teacher will correct and grade your submission soon.
        </p>
        
        <div class="buttons">
            <a href="student_dashboard.html" class="btn btn-primary">Go to Dashboard</a>
            <a href="index.html" class="btn">Back Home</a>
        </div>
    </div>
</body>
</html>
