<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Acceptance Test Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0d1f3c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .container {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            max-width: 900px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
            backdrop-filter: blur(20px);
        }
        h1 {
            color: #fff;
            font-size: 2.8rem;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.05rem;
            margin-bottom: 50px;
            line-height: 1.6;
            font-weight: 400;
        }
        .roles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin: 50px 0;
        }
        .role-btn {
            padding: 32px 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            backdrop-filter: blur(10px);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }
        .role-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
        }
        .role-icon {
            font-size: 3.5rem;
            opacity: 0.9;
        }
        .role-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
        }
        .role-desc {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }
        .footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            font-weight: 400;
        }

        @media (max-width: 600px) {
            .container { padding: 40px 20px; }
            h1 { font-size: 2rem; }
            .roles-grid { gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Acceptance Portal</h1>
        <p class="subtitle">Welcome. Choose your role to continue.</p>
        
        <div class="roles-grid">
            <a href="student_register.html" class="role-btn">
                <div class="role-icon">👨‍🎓</div>
                <div class="role-title">Student</div>
                <div class="role-desc">Take your admission test</div>
            </a>
            
            <a href="teacher_login.html" class="role-btn">
                <div class="role-icon">👩‍🏫</div>
                <div class="role-title">Teacher</div>
                <div class="role-desc">Manage and grade exams</div>
            </a>
            
            <a href="admin_login.html" class="role-btn">
                <div class="role-icon">⚙️</div>
                <div class="role-title">Admin</div>
                <div class="role-desc">System administration</div>
            </a>
        </div>
        <div class="footer">
            School Acceptance Testing System
        </div>
    </div>
</body>
</html>
