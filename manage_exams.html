<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Exams - Acceptance Test Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0d1f3c 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 50px 40px;
            backdrop-filter: blur(20px);
        }
        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 5px;
            text-align: center;
            font-weight: 700;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }
        .form-section {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 40px;
        }
        .form-section-title {
            color: rgba(139, 213, 255, 0.9);
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 8px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input[type="text"], input[type="number"], textarea, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: rgba(139, 213, 255, 0.4);
            background: rgba(139, 213, 255, 0.08);
        }
        .sub-question-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-submit {
            background: rgba(76, 175, 80, 0.2);
            color: rgba(76, 175, 80, 0.9);
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        .btn-submit:hover { background: rgba(76, 175, 80, 0.3); }
        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .btn-back:hover { background: rgba(255, 255, 255, 0.15); }
        .btn-action {
            background: rgba(139, 213, 255, 0.15);
            color: #8bd5ff;
            border: 1px solid rgba(139, 213, 255, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .btn-action:hover { background: rgba(139, 213, 255, 0.25); }
        .questions-list {
            margin-top: 40px;
        }
        .question-card {
            background: rgba(139, 213, 255, 0.06);
            border: 1px solid rgba(139, 213, 255, 0.15);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            text-align: left;
        }
        .question-card-title {
            font-size: 1.1rem;
            color: rgba(139, 213, 255, 0.9);
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .question-card-desc {
            color: rgba(255,255,255,0.8);
            font-size: 0.95rem;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .sub-questions-ol {
            margin-left: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }
        .sub-questions-ol li {
            margin-bottom: 8px;
        }
        .badge-points {
            color: rgba(139, 213, 255, 0.85);
            font-weight: 600;
        }
        .btn-delete {
            padding: 6px 12px;
            background: rgba(255, 107, 107, 0.2);
            color: rgba(255, 107, 107, 0.9);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-delete:hover {
            background: rgba(255, 107, 107, 0.35);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="subjectTitle">Physics Exams</h1>
        <p class="subtitle" id="subjectSubtitle">Create and publish exam exercises</p>
        
        <!-- Add Question Form -->
        <div class="form-section">
            <div class="form-section-title">Create New Question</div>
            <form onsubmit="addQuestion(event)">
                <div class="form-group">
                    <label for="questionTitle">Question Title *</label>
                    <input type="text" id="questionTitle" placeholder="e.g., Kinematics Basics" required>
                </div>
                <div class="form-group">
                    <label for="questionDesc">General Description / Prompt *</label>
                    <textarea id="questionDesc" placeholder="e.g., A particle is moving along a straight coordinate line..." required></textarea>
                </div>

                <div class="form-section-title" style="font-size: 1rem; margin-top: 30px;">Sub-Questions</div>
                
                <div id="subQuestionsContainer">
                    <!-- Dynamic sub questions added here -->
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <button type="button" onclick="addSubQuestion('qcm')" class="btn btn-action">+ Add QCM</button>
                    <button type="button" onclick="addSubQuestion('text')" class="btn btn-action">+ Add Text Answer</button>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-submit">Publish Question</button>
                </div>
            </form>
        </div>

        <!-- Questions List -->
        <div class="questions-list">
            <h3 style="color: #fff; font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; text-align: left;">Published Questions</h3>
            <div id="questionsContainer"></div>
        </div>
        
        <center style="margin-top: 40px;">
            <a href="teacher_dashboard.html" class="btn btn-back">← Back to Portal</a>
        </center>
    </div>

    <script>
        // Check teacher login session
        if (localStorage.getItem('teacher_logged_in') !== 'true') {
            alert("Session expired.");
            window.location.href = "teacher_login.html";
        }

        const urlParams = new URLSearchParams(window.location.search);
        const subject = urlParams.get('subject') || 'physics';

        document.getElementById('subjectTitle').innerText = (subject === 'physics' ? '⚛️ Physics' : '📐 Math') + " Exams";
        document.getElementById('subjectSubtitle').innerText = "Create and publish " + subject + " exercises";

        let subQuestionsList = [];

        function addSubQuestion(type) {
            const index = subQuestionsList.length;
            subQuestionsList.push({ type: type });

            const container = document.getElementById('subQuestionsContainer');
            const div = document.createElement('div');
            div.className = 'sub-question-box';
            div.id = 'sub_q_' + index;

            let innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <strong style="color:rgba(139, 213, 255, 0.95); font-size:0.95rem;">Sub-Question #${index + 1} (${type.toUpperCase()})</strong>
                    <button type="button" onclick="removeSubQuestion(${index})" class="btn-delete" style="padding:2px 8px;">Remove</button>
                </div>
                <div class="form-group">
                    <label>Sub-Question Prompt *</label>
                    <textarea id="sub_prompt_${index}" placeholder="Enter the sub-question prompt..." required></textarea>
                </div>
                <div class="form-group" style="width: 150px;">
                    <label>Points *</label>
                    <input type="number" id="sub_points_${index}" min="1" max="20" value="10" required>
                </div>
            `;

            if (type === 'qcm') {
                innerHTML += `
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px;">
                        <div class="form-group">
                            <label>Choice A *</label>
                            <input type="text" id="sub_choice_A_${index}" placeholder="Choice A content" required>
                        </div>
                        <div class="form-group">
                            <label>Choice B *</label>
                            <input type="text" id="sub_choice_B_${index}" placeholder="Choice B content" required>
                        </div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                        <div class="form-group">
                            <label>Choice C *</label>
                            <input type="text" id="sub_choice_C_${index}" placeholder="Choice C content" required>
                        </div>
                        <div class="form-group">
                            <label>Choice D *</label>
                            <input type="text" id="sub_choice_D_${index}" placeholder="Choice D content" required>
                        </div>
                    </div>
                    <div class="form-group" style="width: 200px;">
                        <label>Correct Choice *</label>
                        <select id="sub_correct_${index}" style="width:100%;">
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                        </select>
                    </div>
                `;
            } else {
                innerHTML += `
                    <div class="form-group">
                        <label>Expected Keyword/Answer (For Auto-Grading) *</label>
                        <input type="text" id="sub_correct_${index}" placeholder="e.g., speed, velocity" required>
                    </div>
                `;
            }

            div.innerHTML = innerHTML;
            container.appendChild(div);
        }

        function removeSubQuestion(index) {
            const element = document.getElementById('sub_q_' + index);
            if (element) {
                element.remove();
                subQuestionsList[index] = null; // Mark as deleted
            }
        }

        // Bootstrap default question if empty
        function bootstrapDefaultQuestions() {
            const key = 'questions_' + subject;
            let questions = JSON.parse(localStorage.getItem(key) || '[]');
            if (questions.length === 0 && subject === 'physics') {
                const defaultPhys = {
                    title: "Kinematics & Dynamics",
                    desc: "A particle is moving along a straight coordinate line. Its position vector relative to the origin satisfies the constant acceleration equation. Study the diagram below representing the motion and answer the sub-questions.",
                    sub_questions: [
                        {
                            type: "qcm",
                            prompt: "What is the SI unit of acceleration?",
                            points: 5,
                            choices: { A: "m/s", B: "m/s²", C: "s", D: "kg" },
                            correct: "B"
                        },
                        {
                            type: "text",
                            prompt: "Define speed in your own words.",
                            points: 15,
                            correct: "distance"
                        }
                    ],
                    timestamp: new Date().toISOString()
                };
                questions.push(defaultPhys);
                localStorage.setItem(key, JSON.stringify(questions));
            }
        }

        bootstrapDefaultQuestions();

        function renderQuestions() {
            const key = 'questions_' + subject;
            const questions = JSON.parse(localStorage.getItem(key) || '[]');
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            questions.forEach((q, qIndex) => {
                const card = document.createElement('div');
                card.className = 'question-card';

                let subHtml = '<ol class="sub-questions-ol">';
                q.sub_questions.forEach(sub => {
                    if (sub.type === 'qcm') {
                        subHtml += `
                            <li>
                                <strong>QCM:</strong> ${sub.prompt} <span class="badge-points">(${sub.points} pts)</span>
                                <ul style="margin-left:20px; list-style-type:circle;">
                                    <li>A: ${sub.choices.A}</li>
                                    <li>B: ${sub.choices.B}</li>
                                    <li>C: ${sub.choices.C}</li>
                                    <li>D: ${sub.choices.D}</li>
                                </ul>
                                <strong>Correct:</strong> Choice ${sub.correct}
                            </li>
                        `;
                    } else {
                        subHtml += `
                            <li>
                                <strong>Text:</strong> ${sub.prompt} <span class="badge-points">(${sub.points} pts)</span><br>
                                <strong>Expected Answer:</strong> "${sub.correct}"
                            </li>
                        `;
                    }
                });
                subHtml += '</ol>';

                card.innerHTML = `
                    <div class="question-card-title">
                        <span>Question ${qIndex + 1}: ${q.title}</span>
                        <button onclick="deleteQuestion(${qIndex})" class="btn-delete">Delete</button>
                    </div>
                    <div class="question-card-desc">${q.desc}</div>
                    ${subHtml}
                `;
                container.appendChild(card);
            });

            if (questions.length === 0) {
                container.innerHTML = `<div style="color:rgba(255,255,255,0.4); text-align:center; padding:30px;">No questions created yet.</div>`;
            }
        }

        function deleteQuestion(index) {
            if (confirm("Are you sure you want to delete this question?")) {
                const key = 'questions_' + subject;
                let questions = JSON.parse(localStorage.getItem(key) || '[]');
                questions.splice(index, 1);
                localStorage.setItem(key, JSON.stringify(questions));
                renderQuestions();
            }
        }

        function addQuestion(event) {
            event.preventDefault();
            
            const activeSubs = subQuestionsList.filter(s => s !== null);
            if (activeSubs.length === 0) {
                alert("Please add at least one sub-question before publishing.");
                return;
            }

            const subQuestionsData = [];
            let valid = true;

            subQuestionsList.forEach((sub, idx) => {
                if (sub === null) return;

                const prompt = document.getElementById('sub_prompt_' + idx).value;
                const points = parseFloat(document.getElementById('sub_points_' + idx).value);
                const correct = document.getElementById('sub_correct_' + idx).value;

                if (sub.type === 'qcm') {
                    const choices = {
                        A: document.getElementById('sub_choice_A_' + idx).value,
                        B: document.getElementById('sub_choice_B_' + idx).value,
                        C: document.getElementById('sub_choice_C_' + idx).value,
                        D: document.getElementById('sub_choice_D_' + idx).value
                    };
                    subQuestionsData.push({
                        type: 'qcm',
                        prompt: prompt,
                        points: points,
                        choices: choices,
                        correct: correct
                    });
                } else {
                    subQuestionsData.push({
                        type: 'text',
                        prompt: prompt,
                        points: points,
                        correct: correct
                    });
                }
            });

            const newQuestion = {
                title: document.getElementById('questionTitle').value,
                desc: document.getElementById('questionDesc').value,
                sub_questions: subQuestionsData,
                timestamp: new Date().toISOString()
            };

            const key = 'questions_' + subject;
            let questions = JSON.parse(localStorage.getItem(key) || '[]');
            questions.push(newQuestion);
            localStorage.setItem(key, JSON.stringify(questions));

            // Reset form
            document.getElementById('questionTitle').value = '';
            document.getElementById('questionDesc').value = '';
            document.getElementById('subQuestionsContainer').innerHTML = '';
            subQuestionsList = [];

            alert("Question published successfully!");
            renderQuestions();
        }

        // Initialize view
        renderQuestions();
    </script>
</body>
</html>
