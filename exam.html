<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceptance Exam - Acceptance Test Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0d1f3c 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #fff;
        }
        .header-bar {
            max-width: 900px;
            width: 100%;
            margin: 0 auto 24px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 16px 24px;
            backdrop-filter: blur(20px);
        }
        .student-info {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
        }
        .timer-box {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .main-container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 40px;
            backdrop-filter: blur(20px);
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            color: #fff;
        }
        .question-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 30px;
            text-align: left;
        }
        .question-header {
            font-size: 1.15rem;
            font-weight: 700;
            color: rgba(139, 213, 255, 0.9);
            margin-bottom: 10px;
        }
        .question-body {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.85);
        }
        .diagram-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0 25px 0;
            display: flex;
            justify-content: center;
        }
        .sub-question {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .sub-question-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #fff;
        }
        .choices-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .choice-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: all 0.3s;
        }
        .choice-option:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(139, 213, 255, 0.3);
        }
        .choice-option.selected {
            background: rgba(139, 213, 255, 0.15);
            border-color: rgba(139, 213, 255, 0.5);
        }
        .choice-option input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #8bd5ff;
            cursor: pointer;
        }
        .choice-label {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: rgba(139, 213, 255, 0.4);
            background: rgba(139, 213, 255, 0.08);
        }
        .buttons {
            display: flex;
            justify-content: flex-end;
            margin-top: 30px;
        }
        .btn-submit {
            padding: 14px 32px;
            background: rgba(76, 175, 80, 0.2);
            color: #4ade80;
            border: 1px solid rgba(76, 175, 80, 0.4);
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            background: rgba(76, 175, 80, 0.35);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.2);
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <div class="student-info">
            Student: <strong id="studentName">Adil Test</strong> (ID: <span id="studentIdDisplay">--</span>)
        </div>
        <div class="timer-box">
            ⏱️ <span id="timer">30:00</span>
        </div>
    </div>

    <div class="main-container">
        <h1 id="examTitle">Physics Entrance Examination</h1>
        
        <form id="examForm" onsubmit="submitExam(event)">
            <div id="dynamicQuestionsContainer">
                <!-- Injected dynamically -->
            </div>

            <div class="buttons">
                <button type="submit" class="btn-submit">Submit Answers</button>
            </div>
        </form>
    </div>

    <script>
        const studentId = localStorage.getItem('current_student_id');
        if (!studentId) {
            alert("No student registered. Redirecting to home.");
            window.location.href = "index.html";
        }

        const students = JSON.parse(localStorage.getItem('students') || '[]');
        const student = students.find(s => s.student_id === studentId);
        if (student) {
            document.getElementById('studentName').innerText = student.name;
            document.getElementById('studentIdDisplay').innerText = studentId;
        }

        // Active Subject
        const activeSubject = localStorage.getItem('active_exam') || 'physics';
        document.getElementById('examTitle').innerText = activeSubject.toUpperCase() + " Entrance Examination";

        // Load custom questions or fallback to defaults
        const questionsKey = 'questions_' + activeSubject;
        let questions = JSON.parse(localStorage.getItem(questionsKey) || '[]');
        
        if (questions.length === 0) {
            // Setup defaults if empty
            if (activeSubject === 'physics') {
                questions = [{
                    title: "Kinematics & Dynamics",
                    desc: "A particle is moving along a straight coordinate line. Its position vector relative to the origin satisfies the constant acceleration equation. Study the diagram below representing the motion and answer the sub-questions.",
                    sub_questions: [
                        {
                            type: "qcm",
                            prompt: "What is the SI unit of acceleration?",
                            points: 5,
                            choices: { A: "m/s", B: "m/s²", C: "s", D: "kg" },
                            correct: "B"
                        },
                        {
                            type: "text",
                            prompt: "Define speed in your own words.",
                            points: 15,
                            correct: "distance"
                        }
                    ]
                }];
            } else {
                questions = [{
                    title: "Calculus & Limits",
                    desc: "Evaluate the mathematical expressions and solve the problems below.",
                    sub_questions: [
                        {
                            type: "qcm",
                            prompt: "What is the limit of sin(x)/x as x approaches 0?",
                            points: 8,
                            choices: { A: "0", B: "1", C: "Infinity", D: "Undefined" },
                            correct: "B"
                        },
                        {
                            type: "text",
                            prompt: "What is the derivative of x² with respect to x?",
                            points: 12,
                            correct: "2x"
                        }
                    ]
                }];
            }
            localStorage.setItem(questionsKey, JSON.stringify(questions));
        }

        // Render questions dynamically
        function renderExam() {
            const qContainer = document.getElementById('dynamicQuestionsContainer');
            qContainer.innerHTML = '';

            questions.forEach((q, qIndex) => {
                const card = document.createElement('div');
                card.className = 'question-card';

                let titleHtml = `<div class="question-header">Question ${qIndex + 1}: ${q.title}</div>`;
                let descHtml = `<div class="question-body">${q.desc}</div>`;
                
                // Vector diagram specifically for default physics kinematic question
                let illustrationHtml = '';
                if (activeSubject === 'physics' && qIndex === 0 && q.title.includes("Kinematics")) {
                    illustrationHtml = `
                    <div class="diagram-container">
                        <svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
                            <line x1="20" y1="70" x2="380" y2="70" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4" />
                            <polygon points="380,66 390,70 380,74" fill="#cbd5e1" />
                            <line x1="80" y1="65" x2="80" y2="75" stroke="#8bd5ff" stroke-width="3" />
                            <text x="75" y="90" fill="#8bd5ff" font-size="12" font-family="sans-serif">O (0)</text>
                            <circle cx="220" cy="70" r="8" fill="#4ade80" />
                            <line x1="220" y1="70" x2="300" y2="70" stroke="#4ade80" stroke-width="3" />
                            <polygon points="300,65 310,70 300,75" fill="#4ade80" />
                            <text x="210" y="55" fill="#4ade80" font-size="12" font-family="sans-serif" font-weight="bold">v (t)</text>
                            <text x="280" y="55" fill="#e2e8f0" font-size="12" font-family="sans-serif">a = const</text>
                        </svg>
                    </div>`;
                }

                let subsHtml = '';
                q.sub_questions.forEach((sub, sIndex) => {
                    if (sub.type === 'qcm') {
                        subsHtml += `
                        <div class="sub-question">
                            <div class="sub-question-title"><b>(${String.fromCharCode(97 + sIndex)})</b> ${sub.prompt} (Points: ${sub.points})</div>
                            <div class="choices-grid">
                                <div class="choice-option" onclick="selectRadio('choice_${qIndex}_${sIndex}_A')">
                                    <input type="radio" id="choice_${qIndex}_${sIndex}_A" name="answer_${qIndex}_${sIndex}" value="A" required>
                                    <label class="choice-label" for="choice_${qIndex}_${sIndex}_A"><b>A.</b> ${sub.choices.A}</label>
                                </div>
                                <div class="choice-option" onclick="selectRadio('choice_${qIndex}_${sIndex}_B')">
                                    <input type="radio" id="choice_${qIndex}_${sIndex}_B" name="answer_${qIndex}_${sIndex}" value="B">
                                    <label class="choice-label" for="choice_${qIndex}_${sIndex}_B"><b>B.</b> ${sub.choices.B}</label>
                                </div>
                                <div class="choice-option" onclick="selectRadio('choice_${qIndex}_${sIndex}_C')">
                                    <input type="radio" id="choice_${qIndex}_${sIndex}_C" name="answer_${qIndex}_${sIndex}" value="C">
                                    <label class="choice-label" for="choice_${qIndex}_${sIndex}_C"><b>C.</b> ${sub.choices.C}</label>
                                </div>
                                <div class="choice-option" onclick="selectRadio('choice_${qIndex}_${sIndex}_D')">
                                    <input type="radio" id="choice_${qIndex}_${sIndex}_D" name="answer_${qIndex}_${sIndex}" value="D">
                                    <label class="choice-label" for="choice_${qIndex}_${sIndex}_D"><b>D.</b> ${sub.choices.D}</label>
                                </div>
                            </div>
                        </div>`;
                    } else {
                        subsHtml += `
                        <div class="sub-question">
                            <div class="sub-question-title"><b>(${String.fromCharCode(97 + sIndex)})</b> ${sub.prompt} (Points: ${sub.points})</div>
                            <textarea id="answer_${qIndex}_${sIndex}" placeholder="Write your answer..." required></textarea>
                        </div>`;
                    }
                });

                card.innerHTML = titleHtml + descHtml + illustrationHtml + subsHtml;
                qContainer.appendChild(card);
            });
        }

        renderExam();

        // Radio option highlighting helper
        function selectRadio(id) {
            document.getElementById(id).checked = true;
            
            const radio = document.getElementById(id);
            const parent = radio.closest('.choices-grid');
            const options = parent.querySelectorAll('.choice-option');
            options.forEach(opt => opt.classList.remove('selected'));
            radio.closest('.choice-option').classList.add('selected');
        }

        // Timer countdown
        const currentDuration = parseInt(localStorage.getItem('exam_duration') || '30');
        let totalSeconds = currentDuration * 60;
        const timerElement = document.getElementById('timer');
        
        const timerInterval = setInterval(() => {
            if (totalSeconds <= 0) {
                clearInterval(timerInterval);
                alert("Time is up! Submitting exam automatically.");
                document.getElementById('examForm').dispatchEvent(new Event('submit'));
                return;
            }
            totalSeconds--;
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            timerElement.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);

        // Submit exam answers
        function submitExam(event) {
            event.preventDefault();
            clearInterval(timerInterval);

            const answers = {};
            const autoResults = {};
            let autoGrade = 0;
            let totalPossiblePoints = 0;

            let unanswered = false;

            questions.forEach((q, qIndex) => {
                q.sub_questions.forEach((sub, sIndex) => {
                    const keyName = `answer_${qIndex}_${sIndex}`;
                    totalPossiblePoints += sub.points;

                    if (sub.type === 'qcm') {
                        const checkedRadio = document.querySelector(`input[name="${keyName}"]:checked`);
                        if (!checkedRadio) {
                            unanswered = true;
                            return;
                        }
                        const ansVal = checkedRadio.value;
                        answers[keyName] = ansVal;

                        const correct = ansVal === sub.correct;
                        const earned = correct ? sub.points : 0;
                        autoResults[keyName] = { correct: correct, earned: earned };
                        autoGrade += earned;
                    } else {
                        const txtVal = document.getElementById(keyName).value;
                        answers[keyName] = txtVal;

                        const cleanAns = txtVal.toLowerCase().trim();
                        const expected = sub.correct.toLowerCase().trim();
                        const correct = cleanAns.includes(expected);
                        const earned = correct ? sub.points : 0;
                        autoResults[keyName] = { correct: correct, earned: earned };
                        autoGrade += earned;
                    }
                });
            });

            if (unanswered) {
                alert("Please answer all questions before submitting.");
                return;
            }

            let finalAutoGrade = totalPossiblePoints > 0 ? (autoGrade / totalPossiblePoints) * 20 : 0;
            finalAutoGrade = Math.round(finalAutoGrade * 100) / 100;

            const submissions = JSON.parse(localStorage.getItem('submissions_' + studentId) || '{}');
            submissions[activeSubject] = {
                answers: answers,
                auto_results: autoResults,
                grade: finalAutoGrade,
                submitted_at: new Date().toISOString()
            };
            localStorage.setItem('submissions_' + studentId, JSON.stringify(submissions));

            localStorage.setItem('exam_status_' + studentId, 'submitted');
            localStorage.setItem('exam_started', 'false');

            window.location.href = "exam_submitted.html";
        }
    </script>
</body>
</html>
