<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Submission - Acceptance Test Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0d1f3c 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 40px;
            backdrop-filter: blur(20px);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 700;
            text-align: center;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            margin-bottom: 35px;
            font-size: 0.95rem;
        }
        .student-meta-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }
        .meta-item {
            text-align: left;
        }
        .meta-label {
            font-size: 0.75rem;
            color: rgba(139, 213, 255, 0.6);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .meta-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: #fff;
        }
        .answer-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }
        .card-header {
            font-size: 1rem;
            font-weight: 700;
            color: rgba(139, 213, 255, 0.9);
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding-bottom: 8px;
        }
        .text-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 4px;
        }
        .student-response {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.95rem;
            margin-bottom: 12px;
            color: #e2e8f0;
        }
        .expected-answer {
            font-size: 0.9rem;
            color: #86efac;
            margin-bottom: 10px;
        }
        .auto-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .badge-correct {
            color: #4ade80;
            font-weight: bold;
        }
        .badge-incorrect {
            color: #f87171;
            font-weight: bold;
        }
        .grading-section {
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 40px;
            padding-top: 30px;
        }
        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }
        label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input[type="number"] {
            width: 120px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
        }
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: none;
        }
        .btn-submit {
            background: rgba(139, 213, 255, 0.18);
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(139, 213, 255, 0.3);
        }
        .btn-submit:hover {
            background: rgba(139, 213, 255, 0.28);
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Correct & Grade Exam</h1>
        <p class="subtitle" id="subjectSubtitle">Physics Exam Submission</p>
        
        <div class="student-meta-card">
            <div class="meta-item">
                <div class="meta-label">Student Name</div>
                <div class="meta-value" id="metaName">--</div>
            </div>
            <div class="meta-item">
                <div class="meta-label">School Type</div>
                <div class="meta-value" id="metaSchoolType">--</div>
            </div>
            <div class="meta-item">
                <div class="meta-label">Note Régional</div>
                <div class="meta-value" id="metaRegional">--</div>
            </div>
            <div class="meta-item">
                <div class="meta-label">Note 4ème</div>
                <div class="meta-value" id="metaTotal">--</div>
            </div>
        </div>

        <form id="gradeForm" onsubmit="submitGrades(event)">
            <!-- Questions List dynamically loaded -->
            <div id="questionsContainer"></div>
            
            <!-- Grading Input fields -->
            <div class="grading-section">
                <div class="form-group">
                    <label for="finalGrade">Final Grade (0 to 20) *</label>
                    <input type="number" id="finalGrade" min="0" max="20" step="0.25" required>
                </div>
                
                <div class="form-group">
                    <label for="teacherComments">Teacher's Feedback & Comments</label>
                    <textarea id="teacherComments" placeholder="Enter evaluation remarks for the student..."></textarea>
                </div>
                
                <div class="buttons">
                    <button type="submit" class="btn btn-submit">Save Grade & Comments</button>
                    <a href="correct_exams.html" class="btn btn-back">Cancel</a>
                </div>
            </div>
        </form>
    </div>

    <script>
        // Check teacher login session
        if (localStorage.getItem('teacher_logged_in') !== 'true') {
            alert("Session expired.");
            window.location.href = "teacher_login.html";
        }

        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('student_id');
        const subject = urlParams.get('subject');

        if (!studentId || !subject) {
            alert("Missing parameters. Redirecting to submissions list.");
            window.location.href = "correct_exams.html";
        }

        document.getElementById('subjectSubtitle').innerText = subject.toUpperCase() + " Exam Submission";

        // Fetch student metadata
        const students = JSON.parse(localStorage.getItem('students') || '[]');
        const student = students.find(s => s.student_id === studentId);
        
        if (student) {
            document.getElementById('metaName').innerText = student.name;
            document.getElementById('metaSchoolType').innerText = student.school_type;
            document.getElementById('metaRegional').innerText = student.regional;
            document.getElementById('metaTotal').innerText = student.total;
        }

        // Fetch exam questions
        const questionsKey = 'questions_' + subject;
        const questions = JSON.parse(localStorage.getItem(questionsKey) || '[]');

        // Fetch submission answers
        const submissions = JSON.parse(localStorage.getItem('submissions_' + studentId) || '{}');
        const examSub = submissions[subject];

        if (examSub) {
            document.getElementById('finalGrade').value = examSub.grade !== undefined ? examSub.grade : '';
            document.getElementById('teacherComments').value = examSub.teacher_comments || '';

            // Render questions dynamically
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            questions.forEach((q, qIndex) => {
                q.sub_questions.forEach((sub, sIndex) => {
                    const keyName = `answer_${qIndex}_${sIndex}`;
                    const studentAns = examSub.answers[keyName] || '[No answer]';
                    const autoRes = examSub.auto_results[keyName] || { correct: false, earned: 0 };

                    const card = document.createElement('div');
                    card.className = 'answer-card';

                    let typeLabel = sub.type === 'qcm' ? 'QCM' : 'Text Answer';
                    let expectedDisplay = sub.type === 'qcm' ? `Choice <strong>${sub.correct}</strong>` : `"${sub.correct}"`;

                    const imgHtml = sub.image ? `<div style="margin: 8px 0;"><img src="${sub.image}" style="max-width:200px; border-radius:6px; border:1px solid rgba(255,255,255,0.1);"></div>` : '';

                    card.innerHTML = `
                        <div class="card-header">Question ${qIndex + 1}(${String.fromCharCode(97 + sIndex)}): ${sub.prompt} (${typeLabel} - Points: ${sub.points})</div>
                        ${imgHtml}
                        <div class="text-label">Student Answer:</div>
                        <div class="student-response">${studentAns}</div>
                        <div class="expected-answer">Expected Answer: ${expectedDisplay}</div>
                        <div class="auto-result">
                            <span>Auto-grader check:</span>
                            <span class="${autoRes.correct ? 'badge-correct' : 'badge-incorrect'}">${autoRes.correct ? 'Correct' : 'Incorrect'} (${autoRes.earned}/${sub.points} points)</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        } else {
            alert("No submission data found for this exam.");
        }

        function submitGrades(event) {
            event.preventDefault();

            const finalScore = parseFloat(document.getElementById('finalGrade').value);
            const comments = document.getElementById('teacherComments').value;

            if (finalScore < 0 || finalScore > 20) {
                alert("Please enter a valid grade between 0 and 20.");
                return;
            }

            if (examSub) {
                examSub.grade = finalScore;
                examSub.teacher_comments = comments;
                examSub.manual_graded = true;
                submissions[subject] = examSub;
                localStorage.setItem('submissions_' + studentId, JSON.stringify(submissions));
            }

            alert("Evaluation saved successfully!");
            window.location.href = "correct_exams.html";
        }
    </script>
</body>
</html>
