<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting Room - Acceptance Test Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0d1f3c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 50px 40px;
            text-align: center;
            backdrop-filter: blur(20px);
        }
        .status-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        h1 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .status-text {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            font-size: 1rem;
            line-height: 1.6;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(139, 213, 255, 0.2);
            border-top: 3px solid rgba(139, 213, 255, 0.6);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .info-section {
            background: rgba(139, 213, 255, 0.08);
            border: 1px solid rgba(139, 213, 255, 0.2);
            border-radius: 14px;
            padding: 20px;
            margin: 30px 0;
            backdrop-filter: blur(10px);
        }
        .info-title {
            color: rgba(139, 213, 255, 0.9);
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 12px;
        }
        .info-item {
            text-align: left;
        }
        .info-label {
            font-size: 0.75rem;
            color: rgba(139, 213, 255, 0.6);
            font-weight: 500;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .info-value {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="status-icon">⏳</div>
        <h1 id="waitingTitle">Registration Confirmed!</h1>
        <p class="status-text" id="statusLabel">
            Waiting for the teacher to start the test...
        </p>
        
        <div class="loading-spinner" id="spinner"></div>
        
        <div class="info-section">
            <div class="info-title">Your Registration Info</div>
            <div class="info-row">
                <div class="info-item">
                    <div class="info-label">Name</div>
                    <div class="info-value" id="dispName">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Age</div>
                    <div class="info-value" id="dispAge">--</div>
                </div>
            </div>
            <div class="info-row">
                <div class="info-item">
                    <div class="info-label">School</div>
                    <div class="info-value" id="dispSchool">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">School Type</div>
                    <div class="info-value" id="dispSchoolType">--</div>
                </div>
            </div>
        </div>
        
        <div class="buttons" id="startBtnContainer" style="display: none;">
            <a href="exam.html" class="btn" style="background: rgba(76, 175, 80, 0.2); color: #4ade80; border: 1px solid rgba(76, 175, 80, 0.3);">📝 Start Exam</a>
        </div>
        
        <div class="buttons">
            <button onclick="leaveWaitingRoom()" class="btn">Leave Waiting Room</button>
        </div>


    </div>

    <script>
        // Extract student id from query parameter or localStorage
        const urlParams = new URLSearchParams(window.location.search);
        let studentId = urlParams.get('student_id') || localStorage.getItem('current_student_id');

        if (!studentId) {
            alert("No student registered. Redirecting to home page.");
            window.location.href = "index.html";
        }

        // Fetch student data from localStorage
        const students = JSON.parse(localStorage.getItem('students') || '[]');
        const student = students.find(s => s.student_id === studentId);

        if (student) {
            document.getElementById('dispName').innerText = student.name;
            document.getElementById('dispAge').innerText = student.age;
            document.getElementById('dispSchool').innerText = student.school;
            document.getElementById('dispSchoolType').innerText = student.school_type;
        }

        function checkStatus() {
            const activeExam = localStorage.getItem('active_exam');
            const examStarted = localStorage.getItem('exam_started') === 'true';
            
            // Check if student already completed this exam
            const submissions = JSON.parse(localStorage.getItem('submissions_' + studentId) || '{}');
            const completed = activeExam && submissions[activeExam];

            if (examStarted && activeExam && !completed) {
                document.getElementById('waitingTitle').innerText = "Exam Available!";
                document.getElementById('statusLabel').innerText = "A " + activeExam.toUpperCase() + " exam is in progress. Please start now.";
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('startBtnContainer').style.display = 'flex';
            } else {
                document.getElementById('waitingTitle').innerText = "Registration Confirmed!";
                document.getElementById('statusLabel').innerText = "Waiting for the teacher to start the test...";
                document.getElementById('spinner').style.display = 'block';
                document.getElementById('startBtnContainer').style.display = 'none';
            }
        }

        // Poll status every 2 seconds
        setInterval(checkStatus, 2000);
        checkStatus();

        function leaveWaitingRoom() {
            localStorage.removeItem('current_student_id');
            window.location.href = "index.html";
        }


    </script>
</body>
</html>
