<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login - Acceptance Test Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0d1f3c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            max-width: 400px;
            width: 100%;
            padding: 50px 40px;
            backdrop-filter: blur(20px);
        }
        h1 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: rgba(139, 213, 255, 0.4);
            background: rgba(139, 213, 255, 0.08);
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border: none;
        }
        .btn-submit {
            background: rgba(139, 213, 255, 0.18);
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(139, 213, 255, 0.3);
        }
        .btn-submit:hover {
            background: rgba(139, 213, 255, 0.28);
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .error-message {
            color: #ff6b6b;
            margin-bottom: 20px;
            text-align: center;
            background: rgba(255,107,107,0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,107,107,0.2);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👩‍🏫 Teacher Login</h1>
        
        <div id="errorBox" class="error-message" style="display: none;"></div>
        
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <div class="buttons">
                <button type="submit" class="btn btn-submit">Login</button>
                <a href="index.html" class="btn btn-back">Back to Home</a>
            </div>
        </form>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');

            if (user === 'Rayan' && pass === '1') {
                localStorage.setItem('teacher_logged_in', 'true');
                window.location.href = "teacher_dashboard.html";
            } else {
                errorBox.innerText = "Invalid username or password";
                errorBox.style.display = "block";
            }
        }
    </script>
</body>
</html>
